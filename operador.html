<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Operador</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
}

.box {
  max-width: 420px;
  margin: 60px auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,.15);
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

select, input, button {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  font-size: 16px;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1e40af;
}

small {
  display: block;
  text-align: center;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Painel do Operador</h2>

  <select id="tipo">
    <option value="Exames">Exames</option>
    <option value="Prioridade">Prioridade</option>
    <option value="Resultados">Resultados</option>
  </select>

  <input id="numero" type="number" placeholder="Número da senha">

  <select id="guiche">
    <option value="Guichê 1">Guichê 1</option>
    <option value="Guichê 2">Guichê 2</option>
    <option value="Guichê 3">Guichê 3</option>
    <option value="Guichê 4">Guichê 4</option>
    <option value="Guichê 5">Guichê 5</option>
  </select>

  <button onclick="chamar()">Chamar Senha</button>

  <small>Ao chamar, a senha será exibida na TV e entrará no histórico</small>
</div>

<script type="module">
import { initializeApp } 
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import { getDatabase, ref, set, push } 
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* 🔴 CONFIGURAÇÃO DO SEU FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB_IhJWewS_qlOqUcwli3Mf04wC6D3wn5Q",
  authDomain: "recep-senhas.firebaseapp.com",
  databaseURL: "https://recep-senhas-default-rtdb.firebaseio.com",
  projectId: "recep-senhas",
  storageBucket: "recep-senhas.appspot.com",
  messagingSenderId: "906681930470",
  appId: "1:906681930470:web:2083f2455d4794eda42127"
};
/* 🔴 FIM */

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* Referências no banco */
const senhaRef = ref(db, "senhaAtual");
const histRef  = ref(db, "historico");

/* Função principal */
window.chamar = () => {

  if (!numero.value) {
    alert("Digite o número da senha");
    return;
  }

  const horaAtual = new Date().toLocaleTimeString("pt-BR");

  const dados = {
    tipo: tipo.value,
    numero: Number(numero.value),
    guiche: guiche.value,
    hora: horaAtual
  };

  /* ✅ Atualiza a senha atual */
  set(senhaRef, dados);

  /* ✅ Cria um novo registro no histórico */
  push(histRef, dados);

  /* Limpa o campo número */
  numero.value = "";
};
</script>

</body>
</html>
