<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Retire sua Senha</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.totem {
  background: #020617;
  padding: 40px;
  border-radius: 16px;
  width: 420px;
  text-align: center;
  box-shadow: 0 30px 60px rgba(0,0,0,.6);
}

h1 {
  margin-bottom: 30px;
}

button {
  width: 100%;
  padding: 22px;
  margin-bottom: 18px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.prioridade { background: #dc2626; }
.exames     { background: #2563eb; }
.resultados { background: #16a34a; }

small {
  display: block;
  margin-top: 20px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="totem">
  <h1>RETIRE SUA SENHA</h1>

  <button class="prioridade" onclick="retirarSenha('Prioridade')">
    PRIORIDADE
  </button>

  <button class="exames" onclick="retirarSenha('Exames')">
    EXAMES
  </button>

  <button class="resultados" onclick="retirarSenha('Resultados')">
    RESULTADOS
  </button>

  <small>Dirija-se à recepção e aguarde a chamada no painel</small>
</div>

<!-- ✅ QZ TRAY (SCRIPT NORMAL, NÃO MODULE) -->
<script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/qz-tray.js ✅ QZ CONFIGURAÇÃO CORRETA */
qz.security.setCertificatePromise(() => Promise.resolve(""));
qz.security.setSignaturePromise(() => Promise.resolve(""));

let qzConectado = false;
let impressora = null;

async function conectarQZ() {
  if (!qzConectado) {
    await qz.websocket.connect();
    impressora = await qz.printers.find("EPSON TM-T20");
    qzConectado = true;
  }
}

async function imprimir(tipo, numero, dataHora) {
  await conectarQZ();

  const cfg = qz.configs.create(impressora);

  const dados = [
    '\x1B\x40',
    '\x1B\x61\x01',
    '\x1B\x21\x30',
    'CLÍNICA CENSO\n\n',
    'SENHA\n',
    tipo.toUpperCase() + '\n\n',
    '\x1B\x21\x38',
    String(numero).padStart(3,'0') + '\n\n',
    '\x1B\x21\x00',
    'Aguarde a chamada\n',
    dataHora + '\n\n\n',
    '\x1D\x56\x41'
  ];

  await qz.print(cfg, dados);
}
</script>
