<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel da TV</title>

<style>
/* ===== GERAL ===== */
body{
  margin:0;
  height:100vh;
  font-family: Arial, sans-serif;
  background:#ffffff;
  color:#111;
  text-align:center;
  position:relative;
}

/* ===== LOGO ===== */
#logo{
  position:fixed;
  top:14px;
  left:20px;
  height:300px;
  z-index:9999;
}

/* ===== RELÓGIO ===== */
#relogio{
  position:fixed;
  top:14px;
  right:20px;
  font-size:26px;
  font-weight:bold;
  background:#111827;
  color:white;
  padding:10px 18px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.35);
  z-index:9999;
}

/* ===== CABEÇALHO ===== */
header{
  padding:25px;
}
header h1{
  margin:0;
}
header small{
  color:#555;
}

/* ===== CARD PRINCIPAL ===== */
.card-principal{
  margin:10px auto 30px auto;
  width:460px;
  border-radius:16px;
  padding:40px 20px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.tipo{
  font-size:26px;
  margin-bottom:10px;
}

.senha{
  font-size:140px;
  font-weight:bold;
}

.guiche{
  font-size:34px;
  margin-top:10px;
}

.hora{
  background:white;
  color:#111;
  padding:10px;
  border-radius:10px;
  margin-top:20px;
  font-weight:bold;
}

/* ===== HISTÓRICO ===== */
.historico{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.hist-card{
  width:220px;
  padding:22px;
  border-radius:14px;
  font-size:20px;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.hist-num{
  font-size:48px;
  font-weight:bold;
  margin:12px 0;
}

/* ===== CORES POR TIPO ===== */
.prioridade{
  background:#dc2626;
  color:white;
}

.exames{
  background:#2563eb;
  color:white;
}

.resultados{
  background:#16a34a;
  color:white;
}
</style>
</head>

<body>

<!-- LOGO -->
<img id="logo" src="logotipo-clinica-censo.png" alt="Logo Clínica Censo">

<!-- RELÓGIO -->
<div id="relogio">--:--:--</div>

<header>
  <h1>Chamada de Senhas</h1>
  <small>Sistema de Atendimento</small>
</header>

<!-- SENHA ATUAL -->
<div id="cardPrincipal" class="card-principal exames">
  <div class="tipo" id="tipo">---</div>
  <div class="senha" id="senha">000</div>
  <div class="guiche" id="guiche">---</div>
  <div class="hora" id="hora">--:--</div>
</div>

<!-- HISTÓRICO -->
<div class="historico" id="historico"></div>

<script type="module">
/* ===== FIREBASE ===== */
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import { getDatabase, ref, onValue }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_IhJWewS_qlOqUcwli3Mf04wC6D3wn5Q",
  authDomain: "recep-senhas.firebaseapp.com",
  databaseURL: "https://recep-senhas-default-rtdb.firebaseio.com",
  projectId: "recep-senhas",
  storageBucket: "recep-senhas.appspot.com",
  messagingSenderId: "906681930470",
  appId: "1:906681930470:web:2083f2455d4794eda42127"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const senhaRef = ref(db,"senhaAtual");
const histRef  = ref(db,"historico");

/* ===== RELÓGIO – BELÉM PA ===== */
function atualizarRelogio(){
  const hora = new Date().toLocaleTimeString("pt-BR",{
    timeZone:"America/Belem",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit"
  });
  document.getElementById("relogio").innerText = hora;
}
setInterval(atualizarRelogio,1000);
atualizarRelogio();

/* ===== COR POR TIPO ===== */
function corPorTipo(tipo){
  return tipo==="Prioridade" ? "prioridade" :
         tipo==="Resultados" ? "resultados" :
         "exames";
}

/* ===== SENHA ATUAL ===== */
onValue(senhaRef, snap=>{
  if(!snap.exists()) return;

  const d = snap.val();

  tipo.innerText   = d.tipo;
  senha.innerText  = String(d.numero).padStart(3,"0");
  guiche.innerText = d.guiche;
  hora.innerText   = "Chamada às " + d.hora;

  cardPrincipal.className =
    "card-principal " + corPorTipo(d.tipo);

  const voz = new SpeechSynthesisUtterance(
    `Senha ${d.numero}. ${d.tipo}. ${d.guiche}`
  );
  voz.lang="pt-BR";
  speechSynthesis.speak(voz);
});

/* ===== HISTÓRICO ===== */
onValue(histRef,snap=>{
  historico.innerHTML="";
  const dados = Object.values(snap.val()||{})
    .slice(-5)
    .reverse();

  dados.forEach(d=>{
    historico.innerHTML += `
      <div class="hist-card ${corPorTipo(d.tipo)}">
        <div>${d.tipo}</div>
        <div class="hist-num">
          ${String(d.numero).padStart(3,"0")}
        </div>
        <div>${d.guiche}</div>
        <small>${d.hora}</small>
      </div>
    `;
  });
});
</script>

</body>
</html>
``
